<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Toros - POS</title>
    <style>
        :root { --primario: #c21807; --oscuro: #1a1a1a; --gris: #f7f7f7; --borde: #e5e5e5; --blanco: #ffffff; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--gris); margin: 0; padding: 0; color: var(--oscuro); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: var(--blanco); padding: 15px; text-align: center; border-bottom: 2px solid var(--oscuro); }
        .logo { max-height: 80px; width: auto; display: block; margin: 0 auto 5px auto; }
        .btn { border: 1px solid var(--oscuro); padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8em; }
        .btn-primario { background: var(--primario); color: white; border-color: var(--primario); }
        .btn-gris { background: transparent; color: var(--oscuro); }
        .btn-danger { background: #ffdddd; color: #cc0000; border-color: #cc0000; padding: 4px 8px; font-size: 0.7em; }
        .view { display: none; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: var(--blanco); padding: 15px; border: 1px solid var(--borde); margin-bottom: 15px; }
        .historial-item { background: var(--gris); padding: 8px; font-size: 0.8em; border: 1px solid var(--borde); margin-top: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .flex-pos { display: flex; flex-wrap: wrap; gap: 20px; }
        .catalogo { flex: 2; min-width: 300px; }
        .ticket-preview { flex: 1; background: var(--blanco); min-width: 300px; padding: 20px; border: 1px solid var(--oscuro); position: sticky; top: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid var(--oscuro); margin-bottom: 10px; }
        .item-admin { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--gris); font-size: 0.9em; }
        @media print {
            body > *:not(#ticket-final) { display: none !important; }
            #ticket-final { display: block !important; width: 100%; }
        }
        .ticket-final { font-family: 'Courier New', monospace; font-size: 13px; color: #000; }
    </style>
</head>
<body>

<header>
    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gIcSUNDX1BST0ZJTEUAAQEAAAIMbGNtcwIQAABtbnRyUkdCIFhZWiAH3AABABkAAwApADlhY3NwQVBQTAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA9tYAAQAAAADTLWxjbXMAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAApkZXNjAAAA/AAAAF5jcHJ0AAABXAAAAAt3dHB0AAABaAAAABRia3B0AAABfAAAABRyWFlaAAABkAAAABRnWFlaAAABpAAAABRiWFlaAAABuAAAABRyVFJDAAABzAAAAEBnVFJDAAABzAAAAEBiVFJDAAABzAAAAEBkZXNjAAAAAAAAAANjMgAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAB0ZXh0AAAAAEZCAABYWVogAAAAAAAA9tYAAQAAAADTLVhZWiAAAAAAAAADFgAAAzMAAAKkWFlaIAAAAAAAAG+iAAA49QAAA5BYWVogAAAAAAAAYpkAALeFAAAY2lhZWiAAAAAAAAAkoAAAD4QAALbPY3VydgAAAAAAAAAaAAAAywHJA2MFkghrC/YQPxVRGzQh8SmQMhg7kkYFUXdd7WtwegWJsZp8rGm/fdPD6TD////bAEMABgQFBgUEBgYFBgcHBggKEAoKCQkKFA4PDBAXFBgYFxQWFhodJR8aGyMcFhYgLCAjJicpKikZHy0wLSgwJSgpKP/bAEMBBwcHCggKEwoKEygaFhooKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKP/CABEIAO0BQAMBIgACEQEDEQH/xAAbAAEAAQUBAAAAAAAAAAAAAAAABAECAwUGB//EABoBAQEBAAMBAAAAAAAAAAAAAAABAgMEBQb/2gAMAwEAAhADEAAAAfP1Xf6tFRRUUVFFRRUUVFFRRUUVFFRRUUVFFRRUUVFFRRUKVFFQCAAAAAAAAFsi2ub1HD0u/CY2+pMb8vt9Qu08sp6rU8op6xU8lr6uTyaz13LceN3+w+V9jqQF1vLxrralRAAAAAAAAWvSub6/pd6BHrd5H1FtapyWMl6YLZNsYLc9Fw0yT98UTaRPN/U+czxrbu/51ouV1twEAAAAAAC0ulxPVeLlm83lx+J9UHD3b7LqXLJiqX3Y7kpSuW4nXSsPd8Tzu32Hku95nnsbNh7PCUWVusvAkAAAFpcFAEqXp+k3EHz/Q5+7pMHR9jQ0yY+H0LlaCqpbdbUpVL1xR99H8x9HwNzzK30PMuG8goATIAtW7NsfSOHXnd/V28WeVjen8Lyb5Y3nJNHT1PoOO+NwOrpb0uGfp/J+gqo63qXLa1VbdFK5N7y9PDq+b6H0fB09m/6XfT8r0u70nZByZABa0JkBWnfcet7x8nZ9Ljk4dhkm5es5THePsZPM6prN6BwcmZ6Td81CvLuGgg4vVV5TOnSSeE6dyT7OegzHfOSi7nVQtDjnFM6rjYunb26jTXfT2cn2Fvl2Ha6ru0OWBmAu09Cv4roNhk7Xz3i47paczpbZmzi/FqvStcsPg7+wTHyFkhjB2EDS206S/lYz2OiZ47Nlz5xg63VZLzaPPhrMbDpZvnOuWH1MTHMQul2nknPzau47uQ0BHQc/tOPXZc93dnn55OT0WyTzjadDROXm9XFa5Kfv5i+d7Ho2HPxuwmNc/G3G13OJzb+Yz5zO6m1nntb6LAXlsHX5jhPQ8Gmu8ej7rBM891eLj9b1fOWu7LhuBoCBLbWtuV1KXFVCrsYm+na6F5fsY7qV836LJJm4u34uy8xgYvW8KdLrPNbd0NubycrS0iclh6C     <h1 id="nombre-negocio" style="margin:0; font-size: 1.5em; text-transform: uppercase;">7 Toros</h1>
</header>

<div class="container">

    <div id="vista-inicio" class="view active">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--oscuro); padding-bottom: 5px;">
            <h2 style="margin:0; font-weight: 400;">👥 CLIENTES</h2>
            <button class="btn btn-gris" onclick="irA('vista-config')">⚙️ Ajustes</button>
        </div>
        <div id="lista-clientes" class="grid"></div>
    </div>

    <div id="vista-caja" class="view">
        <button class="btn btn-gris" onclick="irA('vista-inicio')" style="margin-bottom:15px;">⬅️ Clientes</button>
        <div style="background: var(--oscuro); color: white; padding: 12px; margin-bottom: 15px; font-size: 0.9em;">
            CUENTA: <span id="cliente-actual-nombre" style="color: var(--primario); font-weight: bold;"></span>
        </div>
        <div class="flex-pos">
            <div class="catalogo">
                <div style="background: white; padding: 15px; border: 1px solid var(--oscuro); margin-bottom: 15px;">
                    <label style="font-weight: bold; font-size: 0.8em;">BÁSCULA (KG):</label>
                    <input type="number" id="peso-input" value="1.000" step="0.001" min="0.001" style="font-size: 2em; font-weight: bold; border: none; border-bottom: 2px solid var(--primario); color: var(--primario); margin: 0;">
                </div>
                <div id="catalogo-btns" class="grid"></div>
            </div>
            <div class="ticket-preview" id="seccion-ticket">
                <h3 style="text-align:center; border-bottom: 1px dashed var(--oscuro); padding-bottom:5px; margin-top: 0;">TICKET</h3>
                <div id="carrito-items" style="min-height: 150px; margin-bottom: 10px;"></div>
                <div style="border-top: 1px solid var(--oscuro); padding-top: 10px;">
                    <h3 style="display:flex; justify-content: space-between; margin: 0;">TOTAL: <span id="total-caja">$0.00</span></h3>
                </div>
                <button class="btn btn-primario" style="width:100%; margin-top: 15px;" onclick="finalizarVenta()">🖨️ Imprimir Nota</button>
            </div>
        </div>
    </div>

    <div id="vista-config" class="view">
        <button class="btn btn-gris" onclick="irA('vista-inicio')" style="margin-bottom:15px;">⬅️ Regresar</button>
        
        <div class="card">
            <h3 style="margin-top:0;">🏗️ DATOS DE CABECERA</h3>
            <input type="text" id="cfg-nombre" placeholder="Nombre comercial">
            <input type="text" id="cfg-contacto" placeholder="Teléfono / Dirección">
            <button class="btn btn-primario" onclick="guardarConfigNegocio()">Guardar Cabecera</button>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;">
            <div class="card">
                <h3>🥩 AGREGAR CORTE</h3>
                <input type="text" id="p-nombre" placeholder="Ej. Bistec">
                <input type="number" id="p-precio" placeholder="Precio x Kg">
                <button class="btn btn-primario" style="width: 100%;" onclick="agregarProducto()">Guardar Corte</button>
                <div id="lista-config-productos" style="margin-top: 15px; max-height: 200px; overflow-y: auto;"></div>
            </div>
            <div class="card">
                <h3>👤 REGISTRAR CLIENTE</h3>
                <input type="text" id="c-nombre" placeholder="Nombre cliente">
                <button class="btn btn-primario" style="width: 100%;" onclick="agregarCliente()">Guardar Cliente</button>
                <div id="lista-config-clientes" style="margin-top: 15px; max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<div id="ticket-final" style="display: none;" class="ticket-final"></div>

<script>
    let db = JSON.parse(localStorage.getItem('carniceria_db')) || {
        negocio: { nombre: "7 Toros", contacto: "Distribuidora de Carnes | Tel: 442-XXX-XXXX" },
        productos: [
            { id: 1, nombre: 'Bistec de Res', precio: 160 },
            { id: 2, nombre: 'Costilla de Cerdo', precio: 120 }
        ],
        clientes: [
            { id: 101, nombre: "Cliente General" }
        ],
        ventas: []
    };

    let clienteSeleccionado = null;
    let carrito = [];

    window.onload = () => {
        aplicarConfig();
        renderClientes();
        renderCatalogo();
        renderListasConfig();
    };

    function irA(vistaId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(vistaId).classList.add('active');
        if(vistaId === 'vista-config') renderListasConfig();
    }

    function aplicarConfig() {
        document.getElementById('nombre-negocio').innerText = db.negocio.nombre;
        document.getElementById('cfg-nombre').value = db.negocio.nombre;
        document.getElementById('cfg-contacto').value = db.negocio.contacto;
    }

    function guardarConfigNegocio() {
        db.negocio.nombre = document.getElementById('cfg-nombre').value;
        db.negocio.contacto = document.getElementById('cfg-contacto').value;
        guardarDB();
        aplicarConfig();
        alert("Cabecera actualizada.");
    }

    function agregarCliente() {
        const nom = document.getElementById('c-nombre').value.trim();
        if(!nom) return;
        db.clientes.push({ id: Date.now(), nombre: nom });
        document.getElementById('c-nombre').value = '';
        guardarDB(); renderClientes(); renderListasConfig();
    }

    function eliminarCliente(id) {
        if(confirm("¿Borrar cliente e historial?")) {
            db.clientes = db.clientes.filter(c => c.id !== id);
            db.ventas = db.ventas.filter(v => v.clienteId !== id);
            guardarDB(); renderClientes(); renderListasConfig();
        }
    }

    function renderClientes() {
        const lista = document.getElementById('lista-clientes');
        lista.innerHTML = '';
        db.clientes.forEach(c => {
            const compras = db.ventas.filter(v => v.clienteId === c.id);
            const total = compras.reduce((acc, v) => acc + v.total, 0);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3 style="margin:0;">${c.nombre}</h3>
                <p style="font-size:0.8em; color:#555;">Total: <strong>$${total.toFixed(2)}</strong></p>
                <button class="btn btn-primario" style="width:100%" onclick="iniciarVenta(${c.id}, '${c.nombre}')">Abrir Cuenta</button>
                <div id="historial-${c.id}"></div>
            `;
            compras.slice(-2).reverse().forEach(v => {
                const h = document.createElement('div');
                h.className = 'historial-item';
                h.innerHTML = `<span>${v.fecha.split(' ')[0]}</span> <strong>$${v.total.toFixed(2)}</strong>`;
                h.onclick = () => verDetalleVenta(v);
                card.querySelector(`#historial-${c.id}`).appendChild(h);
            });
            lista.appendChild(card);
        });
    }

    function agregarProducto() {
        const nom = document.getElementById('p-nombre').value.trim();
        const pre = parseFloat(document.getElementById('p-precio').value);
        if(!nom || isNaN(pre) || pre <= 0) return;
        db.productos.push({ id: Date.now(), nombre: nom, precio: pre });
        guardarDB(); renderCatalogo(); renderListasConfig();
        document.getElementById('p-nombre').value = '';
        document.getElementById('p-precio').value = '';
    }

    function eliminarProducto(id) {
        if(confirm("¿Borrar producto del catálogo?")) {
            db.productos = db.productos.filter(p => p.id !== id);
            guardarDB(); renderCatalogo(); renderListasConfig();
        }
    }

    function renderCatalogo() {
        const cat = document.getElementById('catalogo-btns');
        cat.innerHTML = '';
        db.productos.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn btn-gris';
            b.style.background = '#fff';
            b.innerHTML = `<strong>${p.nombre}</strong><br><span style="color:var(--primario)">$${p.precio.toFixed(2)}</span>`;
            b.onclick = () => añadirAlCarrito(p);
            cat.appendChild(b);
        });
    }

    function renderListasConfig() {
        const lp = document.getElementById('lista-config-productos');
        lp.innerHTML = '';
        db.productos.forEach(p => {
            lp.innerHTML += `<div class="item-admin"><span>${p.nombre} ($${p.precio})</span><button class="btn btn-danger" onclick="eliminarProducto(${p.id})">✕</button></div>`;
        });
        const lc = document.getElementById('lista-config-clientes');
        lc.innerHTML = '';
        db.clientes.forEach(c => {
            lc.innerHTML += `<div class="item-admin"><span>${c.nombre}</span><button class="btn btn-danger" onclick="eliminarCliente(${c.id})">✕</button></div>`;
        });
    }

    function iniciarVenta(id, nombre) {
        clienteSeleccionado = { id, nombre };
        document.getElementById('cliente-actual-nombre').innerText = nombre;
        carrito = []; actualizarCarritoUI(); irA('vista-caja');
    }

    function añadirAlCarrito(prod) {
        const peso = parseFloat(document.getElementById('peso-input').value);
        if(isNaN(peso) || peso <= 0) return;
        carrito.push({ ...prod, peso, subtotal: prod.precio * peso });
        document.getElementById('peso-input').value = "1.000";
        actualizarCarritoUI();
    }

    function actualizarCarritoUI() {
        const lista = document.getElementById('carrito-items');
        lista.innerHTML = ''; let t = 0;
        if(carrito.length === 0) {
            lista.innerHTML = '<p style="color:#aaa; text-align:center;">Ticket Vacío.</p>';
            document.getElementById('total-caja').innerText = '$0.00'; return;
        }
        carrito.forEach(item => {
            t += item.subtotal;
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.85em; margin-bottom:5px;"><span>${item.peso.toFixed(3)} Kg - ${item.nombre}</span><span>$${item.subtotal.toFixed(2)}</span></div>`;
        });
        document.getElementById('total-caja').innerText = `$${t.toFixed(2)}`;
    }

    function finalizarVenta() {
        if(carrito.length === 0) return;
        const total = carrito.reduce((acc, i) => acc + i.subtotal, 0);
        const venta = { id: Date.now(), clienteId: clienteSeleccionado.id, clienteNombre: clienteSeleccionado.nombre, fecha: new Date().toLocaleString('es-MX'), items: [...carrito], total: total };
        db.ventas.push(venta); guardarDB(); imprimirTicket(venta); irA('vista-inicio'); renderClientes();
    }

    function imprimirTicket(v) {
        const div = document.getElementById('ticket-final');
        let itemsHtml = v.items.map(i => `<tr><td>${i.nombre}</td><td align="center">${i.peso.toFixed(3)}</td><td align="right">$${i.subtotal.toFixed(2)}</td></tr>`).join('');
        div.innerHTML = `<div style="text-align:center; width:260px; margin:0 auto; color:#000;"><h3 style="margin:0;">${db.negocio.nombre}</h3><p style="font-size:10px; margin:2px 0;">${db.negocio.contacto}</p><p style="margin:0;">------------------------</p><p align="left" style="font-size:10px; margin:4px 0;"><strong>NOTA:</strong> ${v.id}<br><strong>CLIENTE:</strong> ${v.clienteNombre}<br><strong>FECHA:</strong> ${v.fecha}</p><p style="margin:0;">------------------------</p><table width="100%" style="font-size:10px;">${itemsHtml}</table><p style="margin:0;">------------------------</p><h3 align="right" style="margin:4px 0;">TOTAL: $${v.total.toFixed(2)}</h3><p style="font-size:9px; margin-top:10px;">* CONTROL INTERNO *</p></div>`;
        window.print();
    }

    function verDetalleVenta(v) {
        let detalle = v.items.map(i => `• ${i.nombre} (${i.peso.toFixed(3)} Kg): $${i.subtotal.toFixed(2)}`).join('\n');
        alert(`Nota: #${v.id}\nCliente: ${v.clienteNombre}\n-----------\n${detalle}\n-----------\nTOTAL: $${v.total.toFixed(2)}`);
    }

    function guardarDB() { localStorage.setItem('carniceria_db', JSON.stringify(db)); }
</script>
</body>
</html>
