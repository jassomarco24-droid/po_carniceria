<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Cárnicos v1.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #seccion-ticket, #seccion-ticket * { visibility: visible; }
            #seccion-ticket { position: absolute; left: 0; top: 0; width: 100%; }
            #btn-acciones { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col md:flex-row">

    <div class="p-4 flex-1">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">🥩 Punto de Venta - Carnicería</h1>
        
        <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl mb-4 flex items-center justify-between">
            <div>
                <label class="block text-xs font-bold text-blue-700 uppercase">Peso actual en Báscula (Kg)</label>
                <input type="number" id="peso-input" value="1.000" step="0.001" min="0.001" class="text-2xl font-bold text-blue-900 bg-transparent border-b-2 border-blue-400 focus:outline-none w-32">
            </div>
            <p class="text-xs text-blue-600 max-w-xs text-right">Escribe el peso aquí primero y luego presiona el producto para agregarlo.</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="agregarAlCarrito('Bistec de Res', 160)" class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 active:scale-95 transition-transform text-left">
                <p class="font-semibold text-gray-700">Bistec de Res</p>
                <p class="text-green-600 font-medium">$160.00 / Kg</p>
            </button>
            <button onclick="agregarAlCarrito('Costilla de Cerdo', 120)" class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 active:scale-95 transition-transform text-left">
                <p class="font-semibold text-gray-700">Costilla de Cerdo</p>
                <p class="text-green-600 font-medium">$120.00 / Kg</p>
            </button>
            <button onclick="agregarAlCarrito('Longaniza Casera', 95)" class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 active:scale-95 transition-transform text-left">
                <p class="font-semibold text-gray-700">Longaniza Casera</p>
                <p class="text-green-600 font-medium">$95.00 / Kg</p>
            </button>
            <button onclick="agregarAlCarrito('Molida de Res', 140)" class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 active:scale-95 transition-transform text-left">
                <p class="font-semibold text-gray-700">Molida de Res</p>
                <p class="text-green-600 font-medium">$140.00 / Kg</p>
            </button>
        </div>
    </div>

    <div id="seccion-ticket" class="bg-white w-full md:w-96 p-6 shadow-lg border-t md:border-t-0 md:border-l border-gray-300 flex flex-col justify-between">
        <div>
            <div class="text-center border-b border-dashed border-gray-400 pb-4 mb-4">
                <h2 class="text-xl font-bold uppercase tracking-wider">Distribuidora Cárnica</h2>
                <p class="text-xs text-gray-500 mt-1">Nota de Venta Interna</p>
            </div>

            <div id="items-carrito" class="space-y-3 max-h-80 overflow-y-auto mb-4">
                <p class="text-gray-400 text-center text-sm py-4">El carrito está vacío</p>
            </div>

            <div class="border-t border-dashed border-gray-400 pt-4 space-y-1 text-sm">
                <div class="flex justify-between font-bold text-lg border-t pt-2 mt-2">
                    <span>TOTAL:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>
        </div>

        <div id="btn-acciones" class="mt-6 space-y-2">
            <button onclick="imprimirTicket()" class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold shadow-md active:bg-green-700 transition-colors">
                🖨️ Imprimir / Generar Ticket
            </button>
            <button onclick="limpiarCarrito()" class="w-full bg-gray-200 text-gray-700 py-2 rounded-xl text-sm font-medium active:bg-gray-300 transition-colors">
                Vaciar Caja
            </button>
        </div>
    </div>

    <script>
        let carrito = [];

        function agregarAlCarrito(nombre, precio) {
            const pesoInput = document.getElementById('peso-input');
            const cantidad = parseFloat(pesoInput.value);

            if (isNaN(cantidad) || cantidad <= 0) {
                alert("Por favor, ingresa un peso válido.");
                return;
            }

            // En carnes, si vuelven a presionar el producto, sumamos el nuevo pesaje
            const itemExistente = carrito.find(item => item.nombre === nombre);
            if (itemExistente) {
                itemExistente.cantidad += cantidad;
            } else {
                carrito.push({ nombre: nombre, precio: precio, cantidad: cantidad });
            }
            
            // Reiniciar el input de peso a 1 para la siguiente transacción
            pesoInput.value = "1.000";
            actualizarInterfaz();
        }

        function eliminarItem(index) {
            carrito.splice(index, 1);
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const contenedor = document.getElementById('items-carrito');
            contenedor.innerHTML = '';

            if (carrito.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-400 text-center text-sm py-4">El carrito está vacío</p>';
                document.getElementById('total').innerText = '$0.00';
                return;
            }

            let granTotal = 0;

            carrito.forEach((item, index) => {
                const subtotalItem = item.precio * item.cantidad;
                granTotal += subtotalItem;

                const div = document.createElement('div');
                div.className = 'flex justify-between items-center text-sm text-gray-700';
                div.innerHTML = `
                    <div class="flex-1">
                        <span class="font-medium">${item.nombre}</span>
                        <span class="block text-xs text-gray-500">${item.cantidad.toFixed(3)} Kg x $${item.precio.toFixed(2)}</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="font-mono font-semibold">$${subtotalItem.toFixed(2)}</span>
                        <button onclick="eliminarItem(${index})" class="text-red-500 hover:text-red-700 text-xs px-1" id="btn-acciones">✕</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });

            document.getElementById('total').innerText = `$${granTotal.toFixed(2)}`;
        }

        function limpiarCarrito() {
            carrito = [];
            actualizarInterfaz();
        }

        function imprimirTicket() {
            if (carrito.length === 0) {
                alert("Agrega productos antes de imprimir");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
