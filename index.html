<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Toros - Aviso del Sistema</title>
    <style>
        body { background: #f7f7f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #1a1a1a; }
        .box { background: #ffffff; padding: 30px; border-radius: 8px; border: 1px solid #e5e5e5; max-width: 400px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #c21807; font-size: 1.5em; text-transform: uppercase; margin-top: 0; }
        p { font-size: 0.95em; line-height: 1.5; color: #555; }
    </style>
</head>
<body>

<div class="box">
    <h1>Licencia Suspendida</h1>
    <p>El acceso al ecosistema de 7 Toros ha sido pausado temporalmente por falta de pago de renovacion de licencia o saldo pendiente.</p>
    <p>Para reactivar el servicio y recuperar el acceso a sus registros, por favor pongase en contacto con el administrador del software.</p>
</div>

<script>
    // OPERACION LIMPIEZA: Forzamos la destruccion del búnker offline desde el HTML
    if ('serviceWorker' in navigator) {
        // 1. Borrar de golpe todos los archivos guardados en el cache storage
        if (window.caches) {
            caches.keys().then(names => {
                for (let name of names) caches.delete(name);
            });
        }
        // 2. Desregistrar el service worker para que el telefono pierda la ruta offline de la app vieja
        navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
                registration.unregister();
            }
        });
    }
</script>
</body>
</html>
