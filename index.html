<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Toros - Ecosistema POS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primario: #c21807; --oscuro: #1a1a1a; --gris: #f7f7f7; --borde: #e5e5e5; --blanco: #ffffff; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--gris); margin: 0; padding: 0; color: var(--oscuro); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: var(--blanco); padding: 15px; text-align: center; border-bottom: 2px solid var(--oscuro); }
        .logo { max-height: 80px; width: auto; display: block; margin: 0 auto 5px auto; object-fit: contain; }
        .btn { border: 1px solid var(--oscuro); padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8em; transition: 0.1s; }
        .btn-primario { background: var(--primario); color: white; border-color: var(--primario); }
        .btn-gris { background: transparent; color: var(--oscuro); }
        .btn-danger { background: #ffdddd; color: #cc0000; border-color: #cc0000; padding: 4px 8px; font-size: 0.7em; }
        .btn:active { transform: scale(0.97); }
        .view { display: none; }
        .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: var(--blanco); padding: 15px; border: 1px solid var(--borde); margin-bottom: 15px; }
        .historial-item { background: var(--gris); padding: 8px; font-size: 0.8em; border: 1px solid var(--borde); margin-top: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .flex-pos { display: flex; flex-wrap: wrap; gap: 20px; }
        .catalogo { flex: 2; min-width: 300px; }
        .ticket-preview { flex: 1; background: var(--blanco); min-width: 300px; padding: 20px; border: 1px solid var(--oscuro); position: sticky; top: 10px; }
        input, select { width: 100%; padding: 8px; border: 1px solid var(--oscuro); margin-bottom: 10px; background: white; font-size: 1em; }
        .item-admin { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--gris); font-size: 0.9em; }
        .tabs-nav { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--oscuro); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.9em; color: #777; text-transform: uppercase; }
        .tab-btn.active { color: var(--primario); border-bottom: 3px solid var(--primario); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #status-red { font-size: 0.75em; font-weight: bold; padding: 3px 8px; border-radius: 20px; display: inline-block; margin-top: 5px; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/120x60?text=7+Toros" alt="7 Toros" class="logo" id="app-logo">
    <h1 id="nombre-negocio" style="margin:0; font-size: 1.5em; text-transform: uppercase;">7 Toros</h1>
    <div id="status-red" class="online">Conectado</div>
</header>

<div class="container">

    <div id="vista-inicio" class="view active">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--oscuro); padding-bottom: 5px;">
            <h2 style="margin:0; font-weight: 400;">👥 CLIENTES</h2>
            <button class="btn btn-gris" onclick="irA('vista-config')">⚙️ Panel de Control</button>
        </div>
        <div id="lista-clientes" class="grid"></div>
    </div>

    <div id="vista-caja" class="view">
        <button class="btn btn-gris" onclick="irA('vista-inicio')" style="margin-bottom:15px;">⬅️ Volver</button>
        <div style="background: var(--oscuro); color: white; padding: 12px; margin-bottom: 15px; font-size: 0.9em; text-transform: uppercase;">
            Cuenta: <span id="cliente-actual-nombre" style="color: var(--primario); font-weight: bold;"></span>
        </div>
        <div class="flex-pos">
            <div class="catalogo">
                <div style="background: white; padding: 15px; border: 1px solid var(--oscuro); margin-bottom: 15px;">
                    <label style="font-weight: bold; font-size: 0.8em;">BÁSCULA (KG):</label>
                    <input type="number" id="peso-input" value="1.000" step="0.001" min="0.001" style="font-size: 2em; font-weight: bold; border: none; border-bottom: 2px solid var(--primario); color: var(--primario); margin: 0;">
                </div>
                <div id="catalogo-btns" class="grid"></div>
            </div>
            
            <div class="ticket-preview">
                <div id="ticket-captura" style="background: white; padding: 15px; border: 1px dashed #333; margin-bottom: 15px; color: #000;">
                    <div style="text-align: center;">
                        <img src="" class="logo id-ticket-logo" style="max-height: 50px; display: none;">
                        <h3 id="tkt-empresa" style="margin: 5px 0 0 0; text-transform: uppercase;">7 Toros</h3>
                        <p id="tkt-contacto" style="font-size: 10px; margin: 2px 0; color: #555;"></p>
                    </div>
                    <p style="margin: 5px 0; font-size: 10px; border-top: 1px solid #000; padding-top: 5px;">
                        <strong>NOTA:</strong> <span id="tkt-id"></span><br>
                        <strong>CLIENTE:</strong> <span id="tkt-cliente"></span><br>
                        <strong>FECHA:</strong> <span id="tkt-fecha"></span>
                    </p>
                    <table width="100%" style="font-size: 11px; border-top: 1px solid #000; padding-top: 5px;" id="tkt-tabla"></table>
                    <h3 align="right" style="margin: 10px 0 0 0; border-top: 1px dashed #000; padding-top: 5px;">TOTAL: <span id="tkt-total">$0.00</span></h3>
                </div>
                <button class="btn btn-primario" style="width:100%;" onclick="descargarTicketImagen()">💾 Guardar Ticket (Imagen PNG)</button>
            </div>
        </div>
    </div>

    <div id="vista-config" class="view">
        <button class="btn btn-gris" onclick="irA('vista-inicio')" style="margin-bottom:20px;">⬅️ Regresar al Inicio</button>
        
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="cambiarTab('tab-negocio')">🏢 Negocio y Sincronización</button>
            <button class="tab-btn" onclick="cambiarTab('tab-productos')">🥩 Cortes</button>
            <button class="tab-btn" onclick="cambiarTab('tab-clientes')">👥 Clientes</button>
        </div>

        <div id="tab-negocio" class="tab-content active card">
            <h3>🏢 Configuración General</h3>
            <input type="text" id="cfg-nombre" placeholder="Nombre de la Carnicería">
            <input type="text" id="cfg-contacto" placeholder="Teléfono / Dirección">
            
            <label style="font-weight: bold; font-size: 0.85em; display:block; margin-bottom: 5px;">🖼️ LOGO DE LA EMPRESA:</label>
            <input type="file" id="cfg-logo-input" accept="image/*" onchange="procesarLogo(this)">
            
            <div style="background: #eef; padding: 15px; margin-top: 15px; border: 1px solid #ccd;">
                <h4>🔄 Ecosistema en la Nube (Multidispositivo)</h4>
                <p style="font-size:0.8em; color:#555; margin:0 0 10px 0;">Escribe tu clave secreta de sincronización única para enlazar tus pantallas.</p>
                <input type="text" id="cfg-sync-code" placeholder="Ej. toros-7-secreto" onchange="configurarSyncKey()">
                <button class="btn btn-gris" style="width:100%; background: white;" onclick="forzarSincronizacionCloud()">☁️ Forzar Sincronización de Datos</button>
            </div>
            <button class="btn btn-primario" style="width:100%; margin-top: 15px;" onclick="guardarConfigNegocio()">Guardar Configuración</button>
        </div>

        <div id="tab-productos" class="tab-content card">
            <h3>🥩 Gestión de Cortes</h3>
            <div style="background: var(--gris); padding: 12px; margin-bottom: 15px;">
                <input type="text" id="p-nombre" placeholder="Nombre del corte">
                <input type="number" id="p-precio" placeholder="Precio por Kg">
                <button class="btn btn-primario" style="width:100%;" onclick="agregarProducto()">＋ Guardar Producto</button>
            </div>
            <div id="lista-config-productos"></div>
        </div>

        <div id="tab-clientes" class="tab-content card">
            <h3>👥 Gestión de Clientes</h3>
            <div style="background: var(--gris); padding: 12px; margin-bottom: 15px;">
                <input type="text" id="c-nombre" placeholder="Nombre del cliente">
                <button class="btn btn-primario" style="width:100%;" onclick="agregarCliente()">＋ Registrar Cliente</button>
            </div>
            <div id="lista-config-clientes"></div>
        </div>
    </div>
</div>

<div id="ticket-final" style="display: none;" class="ticket-final"></div>

<script>
    let db = JSON.parse(localStorage.getItem('carniceria_db')) || {
        negocio: { nombre: "7 Toros", contacto: "Distribuidora de Carnes", logo: "", syncKey: "" },
        productos: [{ id: 1, nombre: 'Bistec de Res', precio: 160 }],
        clientes: [{ id: 101, nombre: "Cliente General" }],
        ventas: [],
        updatedAt: 0
    };

    let carrito = [];
    let clienteSeleccionado = null;
    const BUCKET_CLOUD = "u8X2p7M4qN8K1sR9B5v9pZ"; 

    window.onload = () => {
        aplicarConfigUI();
        renderClientes();
        renderCatalogo();
        evaluarEstadoRed();
        if(db.negocio.syncKey) descargarDeLaNube();
        setInterval(() => { if(db.negocio.syncKey) descargarDeLaNube(); }, 15000);
    };

    window.addEventListener('online', evaluarEstadoRed);
    window.addEventListener('offline', evaluarEstadoRed);

    function evaluarEstadoRed() {
        const indicador = document.getElementById('status-red');
        if(navigator.onLine) {
            indicador.innerText = "Conectado a la Nube";
            indicador.className = "online";
            if(db.negocio.syncKey) subirALaNube();
        } else {
            indicador.innerText = "Trabajando Offline (Cambios guardados local)";
            indicador.className = "offline";
        }
    }

    function irA(vistaId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(vistaId).classList.add('active');
    }

    function cambiarTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        if(tabId === 'tab-productos' || tabId === 'tab-clientes') renderListasAdmin();
    }

    function aplicarConfigUI() {
        document.getElementById('nombre-negocio').innerText = db.negocio.nombre;
        document.getElementById('cfg-nombre').value = db.negocio.nombre;
        document.getElementById('cfg-contacto').value = db.negocio.contacto;
        document.getElementById('cfg-sync-code').value = db.negocio.syncKey || "";
        
        if(db.negocio.logo) {
            document.getElementById('app-logo').src = db.negocio.logo;
            document.querySelectorAll('.id-ticket-logo').forEach(img => {
                img.src = db.negocio.logo;
                img.style.display = 'block';
            });
        }
    }

    function procesarLogo(input) {
        if (input.files && input.files[0]) {
            const lector = new FileReader();
            lector.onload = function(e) {
                db.negocio.logo = e.target.result;
                guardarDB();
                aplicarConfigUI();
            };
            lector.readAsDataURL(input.files[0]);
        }
    }

    function guardarConfigNegocio() {
        db.negocio.nombre = document.getElementById('cfg-nombre').value;
        db.negocio.contacto = document.getElementById('cfg-contacto').value;
        guardarDB(); aplicarConfigUI();
        alert("Configuración de cabecera guardada.");
    }

    function configurarSyncKey() {
        db.negocio.syncKey = document.getElementById('cfg-sync-code').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '-');
        guardarDB();
        if(db.negocio.syncKey) descargarDeLaNube();
    }

    function agregarCliente() {
        const nom = document.getElementById('c-nombre').value.trim();
        if(!nom) return;
        db.clientes.push({ id: Date.now(), nombre: nom });
        document.getElementById('c-nombre').value = '';
        guardarDB(); renderClientes(); renderListasAdmin();
    }

    function eliminarCliente(id) {
        if(confirm("¿Eliminar este cliente de la lista?")) {
            db.clientes = db.clientes.filter(c => c.id !== id);
            db.ventas = db.ventas.filter(v => v.clienteId !== id);
            guardarDB(); renderClientes(); renderListasAdmin();
        }
    }

    function agregarProducto() {
        const nom = document.getElementById('p-nombre').value.trim();
        const pre = parseFloat(document.getElementById('p-precio').value);
        if(!nom || isNaN(pre) || pre <= 0) return;
        db.productos.push({ id: Date.now(), nombre: nom, precio: pre });
        document.getElementById('p-nombre').value = '';
        document.getElementById('p-precio').value = '';
        guardarDB(); renderCatalogo(); renderListasAdmin();
    }

    function eliminarProducto(id) {
        if(confirm("¿Eliminar este corte del catálogo?")) {
            db.productos = db.productos.filter(p => p.id !== id);
            guardarDB(); renderCatalogo(); renderListasAdmin();
        }
    }

    function renderClientes() {
        const lista = document.getElementById('lista-clientes');
        lista.innerHTML = '';
        db.clientes.forEach(c => {
            const compras = db.ventas.filter(v => v.clienteId === c.id);
            const total = compras.reduce((acc, v) => acc + v.total, 0);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3 style="margin:0; text-transform:uppercase;">${c.nombre}</h3>
                <p style="font-size:0.85em; color:#555;">Historial: <strong>$${total.toFixed(2)}</strong></p>
                <button class="btn btn-primario" style="width:100%" onclick="iniciarVenta(${c.id}, '${c.nombre}')">Nueva Cuenta</button>
                <div id="historial-${c.id}"></div>
            `;
            compras.slice(-2).reverse().forEach(v => {
                card.querySelector(`#historial-${c.id}`).innerHTML += `<div class="historial-item" onclick="verDetalleVenta(${v.id})"><span>${v.fecha.split(' ')[0]}</span><strong>$${v.total.toFixed(2)}</strong></div>`;
            });
            lista.appendChild(card);
        });
    }

    function renderCatalogo() {
        const cat = document.getElementById('catalogo-btns');
        cat.innerHTML = '';
        db.productos.forEach(p => {
            cat.innerHTML += `<button class="btn btn-gris" style="background:#fff; text-align:left;" onclick="añadirAlCarrito(${p.id})"><strong>${p.nombre}</strong><br><span style="color:var(--primario)">$${p.precio.toFixed(2)} / Kg</span></button>`;
        });
    }

    function renderListasAdmin() {
        const lp = document.getElementById('lista-config-productos'); lp.innerHTML = '';
        db.productos.forEach(p => {
            lp.innerHTML += `<div class="item-admin"><span>${p.nombre} ($${p.precio}/kg)</span><button class="btn btn-danger" onclick="eliminarProducto(${p.id})">✕</button></div>`;
        });
        const lc = document.getElementById('lista-config-clientes'); lc.innerHTML = '';
        db.clientes.forEach(c => {
            lc.innerHTML += `<div class="item-admin"><span>${c.nombre}</span><button class="btn btn-danger" onclick="eliminarCliente(${c.id})">✕</button></div>`;
        });
    }

    function iniciarVenta(id, nombre) {
        clienteSeleccionado = { id, nombre };
        document.getElementById('cliente-actual-nombre').innerText = nombre;
        carrito = [];
        actualizarTicketUI();
        irA('vista-caja');
    }

    function añadirAlCarrito(idProd) {
        const prod = db.productos.find(p => p.id === idProd);
        const peso = parseFloat(document.getElementById('peso-input').value);
        if(isNaN(peso) || peso <= 0) return;
        carrito.push({ nombre: prod.nombre, precio: prod.precio, peso: peso, subtotal: prod.precio * peso });
        document.getElementById('peso-input').value = "1.000";
        actualizarTicketUI();
    }

    function actualizarTicketUI() {
        document.getElementById('tkt-empresa').innerText = db.negocio.nombre;
        document.getElementById('tkt-contacto').innerText = db.negocio.contacto;
        document.getElementById('tkt-id').innerText = Date.now().toString().slice(-6);
        document.getElementById('tkt-cliente').innerText = clienteSeleccionado ? clienteSeleccionado.nombre : "General";
        document.getElementById('tkt-fecha').innerText = new Date().toLocaleString('es-MX');

        const tabla = document.getElementById('tkt-tabla');
        tabla.innerHTML = '<tr><th align="left">Corte</th><th align="center">Kg</th><th align="right">Importe</th></tr>';
        let total = 0;
        carrito.forEach(i => {
            total += i.subtotal;
            tabla.innerHTML += `<tr><td>${i.nombre}</td><td align="center">${i.peso.toFixed(3)}</td><td align="right">$${i.subtotal.toFixed(2)}</td></tr>`;
        });
        document.getElementById('tkt-total').innerText = `$${total.toFixed(2)}`;
    }

    function finalizarVenta() {
        if(carrito.length === 0) return;
        const total = carrito.reduce((acc, i) => acc + i.subtotal, 0);
        db.ventas.push({
            id: Date.now(), clienteId: clienteSeleccionado.id, clienteNombre: clienteSeleccionado.nombre,
            fecha: document.getElementById('tkt-fecha').innerText, items: [...carrito], total: total
        });
        guardarDB(); renderClientes();
    }

    function descargarTicketImagen() {
        if(carrito.length === 0) return;
        const contenedor = document.getElementById('ticket-captura');
        html2canvas(contenedor, { scale: 3, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Ticket_${document.getElementById('tkt-id').innerText}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            finalizarVenta();
            irA('vista-inicio');
        });
    }

    function verDetalleVenta(idVenta) {
        const v = db.ventas.find(venta => venta.id === idVenta);
        if(!v) return;
        
        if(!v.items || v.items.length === 0) {
            alert(`Nota: #${v.id.toString().slice(-6)}\nFecha: ${v.fecha}\nCliente: ${v.clienteNombre}\n---------------------------\nNo hay desglose disponible para esta nota antigua.\n---------------------------\nTOTAL: $${v.total.toFixed(2)}`);
            return;
        }
        
        let detalle = v.items.map(i => `• ${i.nombre} (${i.peso.toFixed(3)} Kg) x $${i.precio.toFixed(2)} -> $${i.subtotal.toFixed(2)}`).join('\n');
        alert(`Nota: #${v.id.toString().slice(-6)}\nFecha: ${v.fecha}\nCliente: ${v.clienteNombre}\n---------------------------\n${detalle}\n---------------------------\nTOTAL: $${v.total.toFixed(2)}`);
    }

    function subirALaNube() {
        if(!navigator.onLine || !db.negocio.syncKey) return;
        fetch(`https://kvdb.io/${BUCKET_CLOUD}/${db.negocio.syncKey}`, {
            method: 'PUT', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(db)
        }).catch(err => console.log("Espera de red...", err));
    }

    function descargarDeLaNube() {
        if(!navigator.onLine || !db.negocio.syncKey) return;
        fetch(`https://kvdb.io/${BUCKET_CLOUD}/${db.negocio.syncKey}`)
        .then(res => { if(!res.ok) throw new Error("Nuevo canal"); return res.json(); })
        .then(cloudData => {
            if(cloudData && cloudData.updatedAt) {
                if(cloudData.updatedAt > db.updatedAt) {
                    db = cloudData;
                    localStorage.setItem('carniceria_db', JSON.stringify(db)); 
                    aplicarConfigUI(); renderClientes(); renderCatalogo();
                } else if(db.updatedAt > cloudData.updatedAt) {
                    subirALaNube(); 
                }
            }
        }).catch(() => subirALaNube());
    }

    function forzarSincronizacionCloud() {
        if(!navigator.onLine) { alert("No tienes conexión a internet."); return; }
        if(!db.negocio.syncKey) { alert("Configura una clave de sincronización primero."); return; }
        descargarDeLaNube();
        alert("Sincronización forzada en la nube exitosa.");
    }

    function guardarDB() {
        db.updatedAt = Date.now(); 
        localStorage.setItem('carniceria_db', JSON.stringify(db));
        subirALaNube();
    }
</script>
</body>
</html>
