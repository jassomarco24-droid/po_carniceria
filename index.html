<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Toros - POS Pro</title>
    <style>
        :root {
            --primario: #c21807; /* Rojo Óxido / Cempasúchil */
            --oscuro: #1a1a1a;
            --gris-claro: #f7f7f7;
            --borde: #e5e5e5;
            --blanco: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--gris-claro); margin: 0; padding: 0; color: var(--oscuro); }
        
        /* Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: var(--blanco); padding: 20px; text-align: center; border-bottom: 2px solid var(--oscuro); margin-bottom: 20px; }
        .logo { max-height: 90px; width: auto; object-fit: contain; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
        
        /* Botones */
        .btn { border: 1px solid var(--oscuro); padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.85em; transition: all 0.1s ease; }
        .btn-primario { background: var(--primario); color: white; border-color: var(--primario); }
        .btn-primario:hover { background: var(--oscuro); border-color: var(--oscuro); }
        .btn-gris { background: transparent; color: var(--oscuro); border: 1px solid var(--oscuro); }
        .btn-gris:hover { background: #eee; }
        .btn-danger { background: #ffdddd; color: #cc0000; border-color: #cc0000; padding: 6px 10px; font-size: 0.75em; }
        .btn:active { transform: scale(0.97); }

        /* Vistas */
        .view { display: none; animation: fadeIn 0.2s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .card { background: var(--blanco); padding: 20px; border: 1px solid var(--borde); margin-bottom: 16px; }
        .historial-item { background: var(--gris-claro); padding: 10px; font-size: 0.85em; border: 1px solid var(--borde); margin-top: 8px; cursor: pointer; display: flex; justify-content: space-between; }

        .flex-pos { display: flex; flex-wrap: wrap; gap: 24px; }
        .catalogo { flex: 2; min-width: 320px; }
        .ticket-preview { flex: 1; background: var(--blanco); min-width: 320px; padding: 24px; border: 1px solid var(--oscuro); position: sticky; top: 16px; }

        /* REGLAS DE IMPRESIÓN CORREGIDAS (Oculta la app y fuerza solo el ticket) */
        @media print {
            body > *:not(#ticket-final) { display: none !important; }
            #ticket-final { display: block !important; width: 100%; }
        }
        
        .ticket-final { font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.4; color: #000; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid var(--oscuro); background: var(--blanco); outline: none; font-size: 1em; }
        .item-admin { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--gris-claro); }
    </style>
</head>

    <h1 id="nombre-negocio" style="margin:0; font-size: 1.6em; text-transform: uppercase; letter-spacing: 1px;">7 Toros</h1>
</header>

<div class="container">

    <div id="vista-inicio" class="view active">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--oscuro); padding-bottom: 10px;">
            <h2 style="margin:0; font-weight: 400; text-transform: uppercase;">👥 Clientes Disponibles</h2>
            <button class="btn btn-gris" onclick="irA('vista-config')">⚙️ Configuración</button>
        </div>
        <div id="lista-clientes" class="grid">
            </div>
    </div>

    <div id="vista-caja" class="view">
        <button class="btn btn-gris" onclick="irA('vista-inicio')" style="margin-bottom:20px;">⬅️ Volver a Clientes</button>
        
        <div style="background: var(--oscuro); color: white; padding: 15px; margin-bottom: 24px; text-transform: uppercase; font-size: 0.9em; letter-spacing: 0.5px;">
            <strong>Cuenta Abierta Para:</strong> <span id="cliente-actual-nombre" style="color: var(--primario); font-weight: bold;"></span>
        </div>

        <div class="flex-pos">
            <div class="catalogo">
                <div style="background: #fff; padding: 20px; border: 1px solid var(--oscuro); margin-bottom: 20px;">
                    <label style="font-weight: bold; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px;">Peso actual en Báscula (Kg)</label>
                    <input type="number" id="peso-input" value="1.000" step="0.001" min="0.001" style="font-size: 2.5em; font-weight: bold; border: none; border-bottom: 2px solid var(--primario); color: var(--primario); margin-top: 5px;">
                </div>
                <div id="catalogo-btns" class="grid">
                    </div>
            </div>

            <div class="ticket-preview" id="seccion-ticket">
                <h3 style="text-align:center; border-bottom: 1px dashed var(--oscuro); padding-bottom:10px; text-transform: uppercase; margin-top: 0;">Resumen de Compra</h3>
                <div id="carrito-items" style="min-height: 180px; margin-bottom: 15px; padding-top: 10px;"></div>
                <div style="border-top: 1px solid var(--oscuro); padding-top: 15px;">
                    <h2 style="display:flex; justify-content: space-between; margin: 0; font-weight: 700;">TOTAL: <span id="total-caja" style="color: var(--primario);">$0.00</span></h2>
                </div>
                <button class="btn btn-primario" style="width:100%; margin-top: 20px; font-size: 1em;" onclick="finalizarVenta()">🖨️ Finalizar Nota</button>
            </div>
        </div>
    </div>

    <div id="vista-config" class="view">
        <button class="btn btn-gris" onclick="irA('vista-inicio')" style="margin-bottom:20px;">⬅️ Regresar al Inicio</button>
        
        <div class="card" style="border: 1px solid var(--oscuro);">
            <h3 style="margin-top:0; text-transform: uppercase;">🏗️ Datos del Establecimiento</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="text" id="cfg-nombre" placeholder="Nombre Comercial">
                <input type="text" id="cfg-contacto" placeholder="Teléfono / Dirección">
            </div>
            <button class="btn btn-primario" onclick="guardarConfigNegocio()" style="margin-top:15px;">Guardar Cabecera</button>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-top: 20px;">
            <div class="card">
                <h3 style="margin-top:0; text-transform: uppercase; border-bottom: 1px solid var(--oscuro); padding-bottom: 8px;">🥩 Catálogo de Cortes</h3>
                <div style="margin-bottom: 20px; background: var(--gris-claro); padding: 10px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 0.85em; text-transform: uppercase;">Añadir Nuevo:</h4>
                    <input type="text" id="p-nombre" placeholder="Ej. Rib Eye de Res" style="margin-bottom:8px;">
                    <input type="number" id="p-precio" placeholder="Precio x Kg" style="margin-bottom:12px;">
                    <button class="btn btn-primario" style="width: 100%; padding: 8px;" onclick="agregarProducto()">Guardar Producto</button>
                </div>
                <div id="lista-config-productos" style="max-h: 300px; overflow-y: auto;"></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0; text-transform: uppercase; border-bottom: 1px solid var(--oscuro); padding-bottom: 8px;">👤 Registro de Clientes</h3>
                <div style="margin-bottom: 20px; background: var(--gris-claro); padding: 10px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 0.85em; text-transform: uppercase;">Alta de Cliente:</h4>
                    <input type="text" id="c-nombre" placeholder="Nombre completo o Negocio" style="margin-bottom:12px;">
                    <button class="btn btn-primario" style="width: 100%; padding: 8px;" onclick="agregarCliente()">Registrar Cliente</button>
                </div>
                <div id="lista-config-clientes" style="max-h: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

</div>

<div id="ticket-final" style="display: none;" class="ticket-final"></div>

<script>
    let db = JSON.parse(localStorage.getItem('carniceria_db')) || {
        negocio: { nombre: "7 Toros", contacto: "Distribuidora de Carnes | Tel: 442-XXX-XXXX" },
        productos: [
            { id: 1, nombre: 'Bistec de Res', precio: 160 },
            { id: 2, nombre: 'Costilla de Cerdo', precio: 120 },
            { id: 3, nombre: 'Longaniza Casera', precio: 95 }
        ],
        clientes: [
            { id: 101, nombre: "Cliente General" }
        ],
        ventas: []
    };

    let clienteSeleccionado = null;
    let carrito = [];

    window.onload = () => {
        aplicarConfig();
        renderClientes();
        renderCatalogo();
        renderListasConfig();
    };

    function irA(vistaId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(vistaId).classList.add('active');
        if(vistaId === 'vista-config') renderListasConfig();
    }

    function aplicarConfig() {
        document.getElementById('nombre-negocio').innerText = db.negocio.nombre;
        document.getElementById('cfg-nombre').value = db.negocio.nombre;
        document.getElementById('cfg-contacto').value = db.negocio.contacto;
    }

    function guardarConfigNegocio() {
        db.negocio.nombre = document.getElementById('cfg-nombre').value;
        db.negocio.contacto = document.getElementById('cfg-contacto').value;
        guardarDB();
        aplicarConfig();
        alert("Cabecera del ticket actualizada.");
    }

    // GESTIÓN DE CLIENTES
    function agregarCliente() {
        const nom = document.getElementById('c-nombre').value.trim();
        if(!nom) return;
        db.clientes.push({ id: Date.now(), nombre: nom });
        document.getElementById('c-nombre').value = '';
        guardarDB();
        renderClientes();
        renderListasConfig();
    }

    function eliminarCliente(id) {
        if(confirm("¿Seguro que deseas borrar este cliente? Se perderá su historial.")) {
            db.clientes = db.clientes.filter(c => c.id !== id);
            db.ventas = db.ventas.filter(v => v.clienteId !== id); // Limpia ventas huerfanas
            guardarDB();
            renderClientes();
            renderListasConfig();
        }
    }

    function renderClientes() {
        const lista = document.getElementById('lista-clientes');
        lista.innerHTML = '';
        db.clientes.forEach(c => {
            const compras = db.ventas.filter(v => v.clienteId === c.id);
            const totalComprado = compras.reduce((acc, v) => acc + v.total, 0);

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3 style="margin-top:0; font-weight: 600; text-transform: uppercase;">${c.nombre}</h3>
                <p style="font-size:0.85em; color:#555; margin-bottom:15px;">Historial: <strong>$${totalComprado.toFixed(2)}</strong></p>
                <button class="btn btn-primario" style="width:100%" onclick="iniciarVenta(${c.id}, '${c.nombre}')">Abrir Cuenta</button>
                <div style="margin-top: 12px; border-top: 1px dashed var(--borde); padding-top: 8px;">
                    <div id="historial-${c.id}"></div>
                </div>
            `;
            
            compras.slice(-2).reverse().forEach(v => {
                const h = document.createElement('div');
                h.className = 'historial-item';
                h.innerHTML = `<span>${v.fecha.split(' ')[0]}</span> <strong>$${v.total.toFixed(2)}</strong>`;
                h.onclick = () => verDetalleVenta(v);
                card.querySelector(`#historial-${c.id}`).appendChild(h);
            });
            lista.appendChild(card);
        });
    }

    // GESTIÓN DE PRODUCTOS
    function agregarProducto() {
        const nom = document.getElementById('p-nombre').value.trim();
        const pre = parseFloat(document.getElementById('p-precio').value);
        if(!nom || isNaN(pre) || pre <= 0) return;
        db.productos.push({ id: Date.now(), nombre: nom, precio: pre });
        guardarDB();
        renderCatalogo();
        renderListasConfig();
        document.getElementById('p-nombre').value = '';
        document.getElementById('p-precio').value = '';
    }

    function eliminarProducto(id) {
        if(confirm("¿Deseas eliminar este producto del catálogo?")) {
            db.productos = db.productos.filter(p => p.id !== id);
            guardarDB();
            renderCatalogo();
            renderListasConfig();
        }
    }

    function renderCatalogo() {
        const cat = document.getElementById('catalogo-btns');
        cat.innerHTML = '';
        db.productos.forEach(p => {
            const b = document.createElement('button');
            b.className = 'btn btn-gris';
            b.style.textAlign = 'left';
            b.style.background = '#ffffff';
            b.innerHTML = `<span style="display:block; font-size:1.05em; margin-bottom:4px;">${p.nombre}</span><span style="color:var(--primario); font-weight:bold;">$${p.precio.toFixed(2)} / Kg</span>`;
            b.onclick = () => añadirAlCarrito(p);
            cat.appendChild(b);
        });
    }

    // RENDERIZAR EDICIÓN/BORRADO EN PANTALLA CONFIGURACIÓN
    function renderListasConfig() {
        const listaProds = document.getElementById('lista-config-productos');
        listaProds.innerHTML = '';
        db.productos.forEach(p => {
            listaProds.innerHTML += `
                <div class="item-admin">
                    <span>${p.nombre} ($${p.precio}/kg)</span>
                    <button class="btn btn-danger" onclick="eliminarProducto(${p.id})">Borrar</button>
                </div>`;
        });

        const listaClientes = document.getElementById('lista-config-clientes');
        listaClientes.innerHTML = '';
        db.clientes.forEach(c => {
            listaClientes.innerHTML += `
                <div class="item-admin">
                    <span>${c.nombre}</span>
                    <button class="btn btn-danger" onclick="eliminarCliente(${c.id})">Borrar</button>
                </div>`;
        });
    }

    // FLUJO DE TRANSACCIÓN
    function iniciarVenta(id, nombre) {
        clienteSeleccionado = { id, nombre };
        document.getElementById('cliente-actual-nombre').innerText = nombre;
        carrito = [];
        actualizarCarritoUI();
        irA('vista-caja');
    }

    function añadirAlCarrito(prod) {
        const peso = parseFloat(document.getElementById('peso-input').value);
        if(isNaN(peso) || peso <= 0) return;
        carrito.push({ ...prod, peso, subtotal: prod.precio * peso });
        document.getElementById('peso-input').value = "1.000";
        actualizarCarritoUI();
    }

    function actualizarCarritoUI() {
        const lista = document.getElementById('carrito-items');
        lista.innerHTML = '';
        let t = 0;
        
        if(carrito.length === 0) {
            lista.innerHTML = '<p style="color:#aaa; text-align:center; padding-top:40px;">Ticket Vacío.</p>';
            document.getElementById('total-caja').innerText = '$0.00';
            return;
        }

        carrito.forEach(item => {
            t += item.subtotal;
            lista.innerHTML += `
                <div style="display:flex; justify-content:space-between; font-size:0.9em; margin-bottom:8px;">
                    <span><strong>${item.peso.toFixed(3)} Kg</strong> - ${item.nombre}</span>
                    <span>$${item.subtotal.toFixed(2)}</span>
                </div>`;
        });
        document.getElementById('total-caja').innerText = `$${t.toFixed(2)}`;
    }

    function finalizarVenta() {
        if(carrito.length === 0) return;
        
        const total = carrito.reduce((acc, i) => acc + i.subtotal, 0);
        const venta = {
            id: Date.now(),
            clienteId: clienteSeleccionado.id,
            clienteNombre: clienteSeleccionado.nombre,
            fecha: new Date().toLocaleString('es-MX'),
            items: [...carrito],
            total: total
        };

        db.ventas.push(venta);
        guardarDB();
        imprimirTicket(venta);
        irA('vista-inicio');
        renderClientes();
    }

    function imprimirTicket(v) {
        const div = document.getElementById('ticket-final');
        let itemsHtml = v.items.map(i => `
            <tr>
                <td>${i.nombre}</td>
                <td align="center">${i.peso.toFixed(3)}</td>
                <td align="right">$${i.subtotal.toFixed(2)}</td>
            </tr>`).join('');

        div.innerHTML = `
            <div style="text-align:center; width:280px; margin:0 auto; padding:10px; color:#000;">
                <h3 style="margin:0; text-transform:uppercase; font-size:15px;">${db.negocio.nombre}</h3>
                <p style="font-size:11px; margin:4px 0;">${db.negocio.contacto}</p>
                <p style="margin:0;">==============================</p>
                <p align="left" style="margin:5px 0; font-size:11px;">
                    <strong>NOTA ID:</strong> ${v.id}<br>
                    <strong>CLIENTE:</strong> ${v.clienteNombre}<br>
                    <strong>FECHA:</strong> ${v.fecha}
                </p>
                <p style="margin:0;">==============================</p>
                <table width="100%" style="font-size:11px;">
                    <tr><th align="left">Corte</th><th align="center">Kg</th><th align="right">Total</th></tr>
                    ${itemsHtml}
                </table>
                <p style="margin:0;">==============================</p>
                <h3 align="right" style="margin:5px 0; font-size:13px;">TOTAL: $${v.total.toFixed(2)}</h3>
                <p style="margin-top:15px; font-size:10px;">*** NOTA DE CONTROL INTERNO ***</p>
            </div>
        `;
        window.print();
    }

    function verDetalleVenta(v) {
        let detalle = v.items.map(i => `• ${i.nombre} (${i.peso.toFixed(3)} Kg) -> $${i.subtotal.toFixed(2)}`).join('\n');
        alert(`Nota: #${v.id}\nCliente: ${v.clienteNombre}\n----------------------------\n${detalle}\n----------------------------\nTOTAL: $${v.total.toFixed(2)}`);
    }

    function guardarDB() {
        localStorage.setItem('carniceria_db', JSON.stringify(db));
    }
</script>

</body>
</html>
