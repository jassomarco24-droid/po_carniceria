<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Cárnicos Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #seccion-ticket, #seccion-ticket * { visibility: visible; }
            #seccion-ticket { position: absolute; left: 0; top: 0; width: 100%; }
            #btn-acciones, #btn-admin-toggle { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col md:flex-row">

    <div class="p-4 flex-1 flex flex-col justify-between">
        
        <div id="vista-caja">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold text-gray-800">🥩 Caja - Catálogo</h1>
                <button onclick="toggleModoAdmin(true)" id="btn-admin-toggle" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-sm font-medium active:scale-95 transition-transform">
                    ⚙️ Administrar Productos
                </button>
            </div>
            
            <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl mb-4 flex items-center justify-between">
                <div>
                    <label class="block text-xs font-bold text-blue-700 uppercase">Peso en Báscula (Kg)</label>
                    <input type="number" id="peso-input" value="1.000" step="0.001" min="0.001" class="text-2xl font-bold text-blue-900 bg-transparent border-b-2 border-blue-400 focus:outline-none w-32">
                </div>
                <p class="text-xs text-blue-600 max-w-xs text-right">Digita el peso y luego presiona el producto.</p>
            </div>

            <div id="catalogo-productos" class="grid grid-cols-2 gap-3">
                </div>
        </div>

        <div id="vista-admin" class="hidden bg-white p-5 rounded-2xl shadow-inner border border-gray-200 mb-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-800">⚙️ Panel de Productos</h2>
                <button onclick="toggleModoAdmin(false)" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium">
                    🛒 Volver a la Caja
                </button>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl mb-6 border border-gray-200">
                <h3 class="text-sm font-bold text-gray-700 mb-3">Agregar Nuevo Producto</h3>
                <div class="grid grid-cols-1 gap-3 md:grid-cols-3 items-end">
                    <div>
                        <label class="block text-xs text-gray-500 font-medium mb-1">Nombre del corte</label>
                        <input type="text" id="admin-nombre" placeholder="Ej. Pulpa de Res" class="w-full p-2 border rounded-lg text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 font-medium mb-1">Precio por Kg ($)</label>
                        <input type="number" id="admin-precio" placeholder="0.00" step="0.01" class="w-full p-2 border rounded-lg text-sm bg-white">
                    </div>
                    <button onclick="guardarProducto()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-bold active:bg-blue-700">
                        ＋ Guardar Producto
                    </button>
                </div>
            </div>

            <h3 class="text-sm font-bold text-gray-700 mb-2">Productos en existencia</h3>
            <div id="lista-admin-productos" class="divide-y divide-gray-200 max-h-60 overflow-y-auto">
                </div>
        </div>

        <p class="text-xs text-gray-400 text-center mt-4">POS Cárnicos v1.2 • Guardado Local Permanente</p>
    </div>

    <div id="seccion-ticket" class="bg-white w-full md:w-96 p-6 shadow-lg border-t md:border-t-0 md:border-l border-gray-300 flex flex-col justify-between">
        <div>
            <div class="text-center border-b border-dashed border-gray-400 pb-4 mb-4">
                <h2 class="text-xl font-bold uppercase tracking-wider">Distribuidora Cárnica</h2>
                <p class="text-xs text-gray-500 mt-1">Nota de Venta Interna</p>
            </div>

            <div id="items-carrito" class="space-y-3 max-h-80 overflow-y-auto mb-4">
                <p class="text-gray-400 text-center text-sm py-4">El carrito está vacío</p>
            </div>

            <div class="border-t border-dashed border-gray-400 pt-4 space-y-1 text-sm">
                <div class="flex justify-between font-bold text-lg border-t pt-2 mt-2">
                    <span>TOTAL:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>
        </div>

        <div id="btn-acciones" class="mt-6 space-y-2">
            <button onclick="imprimirTicket()" class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold shadow-md active:bg-green-700">
                🖨️ Imprimir / Generar Ticket
            </button>
            <button onclick="limpiarCarrito()" class="w-full bg-gray-200 text-gray-700 py-2 rounded-xl text-sm font-medium">
                Vaciar Caja
            </button>
        </div>
    </div>

    <script>
        // 1. Cargar productos desde LocalStorage o usar unos por defecto si está vacío
        let productosPredeterminados = [
            { id: 1, nombre: 'Bistec de Res', precio: 160 },
            { id: 2, nombre: 'Costilla de Cerdo', precio: 120 },
            { id: 3, font: 'Longaniza Casera', nombre: 'Longaniza Casera', precio: 95 }
        ];

        let productos = JSON.parse(localStorage.getItem('mis_productos')) || productosPredeterminados;
        let carrito = [];

        // Inicializar la aplicación
        actualizarCatalogo();

        // Alternar vistas entre Caja y Administrador
        function toggleModoAdmin(mostrar) {
            if (mostrar) {
                document.getElementById('vista-caja').classList.add('hidden');
                document.getElementById('vista-admin').classList.remove('hidden');
                actualizarListaAdmin();
            } else {
                document.getElementById('vista-admin').classList.add('hidden');
                document.getElementById('vista-caja').classList.remove('hidden');
                actualizarCatalogo();
            }
        }

        // Renderizar botones en el catálogo de ventas
        function actualizarCatalogo() {
            const catalogo = document.getElementById('catalogo-productos');
            catalogo.innerHTML = '';

            if(productos.length === 0) {
                catalogo.innerHTML = '<p class="text-gray-400 col-span-2 text-center py-6">No hay productos. Ve a Administración para agregar algunos.</p>';
                return;
            }

            productos.forEach(prod => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-200 active:scale-95 transition-transform text-left";
                btn.onclick = () => agregarAlCarrito(prod.nombre, prod.precio);
                btn.innerHTML = `
                    <p class="font-semibold text-gray-700">${prod.nombre}</p>
                    <p class="text-green-600 font-medium">$${prod.precio.toFixed(2)} / Kg</p>
                `;
                catalogo.appendChild(btn);
            });
        }

        // Renderizar la lista de productos en el panel de administración
        function actualizarListaAdmin() {
            const listaAdmin = document.getElementById('lista-admin-productos');
            listaAdmin.innerHTML = '';

            productos.forEach(prod => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center py-2.5";
                div.innerHTML = `
                    <div>
                        <p class="font-medium text-gray-800">${prod.nombre}</p>
                        <p class="text-xs text-gray-500">$${prod.precio.toFixed(2)} por Kg</p>
                    </div>
                    <button onclick="eliminarProducto(${prod.id})" class="text-red-500 bg-red-50 hover:bg-red-100 px-2.5 py-1 rounded-lg text-xs font-semibold">
                        Borrar
                    </button>
                `;
                listaAdmin.appendChild(div);
            });
        }

        // Guardar un producto nuevo
        function guardarProducto() {
            const nombreInput = document.getElementById('admin-nombre');
            const precioInput = document.getElementById('admin-precio');
            
            const nombre = nombreInput.value.trim();
            const precio = parseFloat(precioInput.value);

            if (!nombre || isNaN(precio) || precio <= 0) {
                alert("Por favor llena ambos campos con datos válidos.");
                return;
            }

            const nuevoProducto = {
                id: Date.now(), // ID único basado en el tiempo
                nombre: nombre,
                precio: precio
            };

            productos.push(nuevoProducto);
            localStorage.setItem('mis_productos', JSON.stringify(productos));
            
            // Limpiar inputs
            nombreInput.value = '';
            precioInput.value = '';
            
            actualizarListaAdmin();
        }

        // Eliminar producto de la lista del admin
        function eliminarProducto(id) {
            if(confirm("¿Seguro que quieres eliminar este producto del catálogo?")) {
                productos = productos.filter(p => p.id !== id);
                localStorage.setItem('mis_productos', JSON.stringify(productos));
                actualizarListaAdmin();
            }
        }

        // --- LÓGICA DE LA CAJA / CARRITO ---
        function agregarAlCarrito(nombre, precio) {
            const pesoInput = document.getElementById('peso-input');
            const cantidad = parseFloat(pesoInput.value);

            if (isNaN(cantidad) || cantidad <= 0) {
                alert("Ingresa un peso válido.");
                return;
            }

            const itemExistente = carrito.find(item => item.nombre === nombre);
            if (itemExistente) {
                itemExistente.cantidad += cantidad;
            } else {
                carrito.push({ nombre: nombre, precio: precio, cantidad: cantidad });
            }
            
            pesoInput.value = "1.000";
            actualizarInterfazTicket();
        }

        function eliminarItemCarrito(index) {
            carrito.splice(index, 1);
            actualizarInterfazTicket();
        }

        function actualizarInterfazTicket() {
            const contenedor = document.getElementById('items-carrito');
            contenedor.innerHTML = '';

            if (carrito.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-400 text-center text-sm py-4">El carrito está vacío</p>';
                document.getElementById('total').innerText = '$0.00';
                return;
            }

            let granTotal = 0;

            carrito.forEach((item, index) => {
                const subtotalItem = item.precio * item.cantidad;
                granTotal += subtotalItem;

                const div = document.createElement('div');
                div.className = 'flex justify-between items-center text-sm text-gray-700';
                div.innerHTML = `
                    <div class="flex-1">
                        <span class="font-medium">${item.nombre}</span>
                        <span class="block text-xs text-gray-500">${item.cantidad.toFixed(3)} Kg x $${item.precio.toFixed(2)}</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="font-mono font-semibold">$${subtotalItem.toFixed(2)}</span>
                        <button onclick="eliminarItemCarrito(${index})" class="text-red-500 text-xs px-1" id="btn-acciones">✕</button>
                    </div>
                `;
                contenedor.appendChild(div);
            });

            document.getElementById('total').innerText = `$${granTotal.toFixed(2)}`;
        }

        function limpiarCarrito() {
            carrito = [];
            actualizarInterfazTicket();
        }

        function imprimirTicket() {
            if (carrito.length === 0) {
                alert("Agrega productos antes de imprimir");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
